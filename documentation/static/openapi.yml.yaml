openapi: 3.0.3
info:
  title: VibeCheck Backend API
  version: 1.0.0
  description: Auto-generated from Flask route definitions in src/bot/oauth_server.py
servers:
- url: https://vibecheck.up.railway.app
  description: Production
- url: http://localhost:8080
  description: Local
paths:
  /slack/install:
    get:
      summary: Start Slack OAuth installation
      description: Redirects user to Slack OAuth authorization URL.
      responses:
        '302':
          description: Redirect to Slack OAuth authorize URL
  /slack/events:
    post:
      summary: Receive Slack events
      description: Receives Slack Events API payloads and forwards them to the Bolt
        handler.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Processed by Slack Bolt handler
        '400':
          description: Bad request payload
        '401':
          description: Unauthorized request
        '500':
          description: Unexpected backend error
  /slack/oauth_redirect:
    get:
      summary: Slack OAuth redirect callback
      description: Exchanges OAuth code for access token and stores installation details.
      parameters:
      - name: code
        in: query
        required: false
        schema:
          type: string
        description: Slack OAuth authorization code
      responses:
        '200':
          description: Installation completed
        '400':
          description: Missing or invalid OAuth code
